services:

 db:
  image : postgres:15
  container_name: todex_db
  environment:
    POSTGRES_USER : tripti 
    POSTGRES_PASSWORD : abcd123
    POSTGRES_DB : todex
  ports:
    - "5432:5432"
  volumes:
    - postgres_data:/var/lib/postgresql/data
  healthcheck:
    test: ["CMD-SHELL" , "pg_isready -U tripti -d todex"]
    interval : 5s
    timeout : 5s
    retries: 5

volumes:
  postgres_data:
  
    