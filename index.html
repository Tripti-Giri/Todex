<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Enhanced To-Do List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head> 
<body> 
    <div class="todo-container"> 
        <div class="app-header">
            <h2>Enhanced To-Do List</h2>
            <button id="darkModeToggle" class="theme-toggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
        
        <div class="input-container"> 
            <input type="text" id="taskInput" placeholder="What needs to be done?"> 
            <div class="input-row">
                <select id="taskCategory"> 
                    <option value="Work">Work</option> 
                    <option value="Personal">Personal</option> 
                    <option value="Other">Other</option> 
                </select> 
                <select id="taskPriority"> 
                    <option value="High">High Priority</option> 
                    <option value="Medium">Medium Priority</option> 
                    <option value="Low">Low Priority</option> 
                </select>
            </div>
            <div class="input-row">
                <input type="date" id="dueDate" class="due-date">
                <button id="addTaskBtn">
                    <i class="fas fa-plus"></i> Add Task
                </button>
            </div> 
        </div>
        
        <div class="filter-section">
            <input type="text" id="searchInput" placeholder="Search tasks...">
            <button class="filter-button active" data-filter="all">All</button>
            <button class="filter-button" data-filter="active">Active</button>
            <button class="filter-button" data-filter="completed">Completed</button>
        </div>
        
        <ul id="taskList">
            <!-- Tasks will be added here dynamically -->
            <div class="no-tasks">No tasks yet. Add one above!</div>
        </ul>
        
        <div class="stats-container">
            <div class="stats-title">Task Overview</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalTasks">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="completedTasks">0</div>
                    <div class="stat-label">Completed</div>
                    <div class="progress-container">
                        <div class="progress-bar" id="completionRate" style="width: 0%"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="highPriorityTasks">0</div>
                    <div class="stat-label">High Priority</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="dueSoonTasks">0</div>
                    <div class="stat-label">Due Soon</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title">Edit Task</h3>
            <div class="input-container">
                <input type="text" id="editTaskInput" placeholder="Task description">
                <div class="input-row">
                    <select id="editTaskCategory"> 
                        <option value="Work">Work</option> 
                        <option value="Personal">Personal</option> 
                        <option value="Other">Other</option> 
                    </select> 
                    <select id="editTaskPriority"> 
                        <option value="High">High Priority</option> 
                        <option value="Medium">Medium Priority</option> 
                        <option value="Low">Low Priority</option> 
                    </select>
                </div>
                <input type="date" id="editDueDate">
            </div>
            <div class="modal-footer">
                <button id="closeEditModal" class="modal-close">Cancel</button>
                <button id="saveTaskBtn">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="script.js"> </script>
</body> 
</html>
